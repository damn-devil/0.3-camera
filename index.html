<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="manifest" href="manifest.json">
<title>0.3MP — Old Phone Camera</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#000;color:#aaa;font-family:'Courier New',monospace;user-select:none;-webkit-user-select:none;touch-action:none;-webkit-touch-callout:none}
#app{position:relative;width:100%;height:100%;display:flex;flex-direction:column;background:#111}
#top{padding:4px 10px;background:#1a1a1a;border-bottom:1px solid #222;font-size:10px;display:flex;justify-content:space-between;flex-shrink:0;min-height:28px;align-items:center}
#top .l{color:#555}#top .m{color:#ff6b35;font-size:10px;font-weight:bold;text-align:center;flex:1}#top .r{color:#666;font-size:9px}
#view{flex:1;position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center;background:#000}
#view video{display:none}
#view canvas{display:block;max-width:100%;max-height:100%;object-fit:contain;image-rendering:auto}
#rec-dot{display:none;width:7px;height:7px;border-radius:50%;background:red;animation:pulse 1s infinite;vertical-align:middle;margin-right:4px}
#rec-dot.on{display:inline-block}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
#zoom-indicator{position:absolute;bottom:20%;left:50%;transform:translateX(-50%);color:rgba(255,255,255,.12);font-size:36px;font-weight:bold;pointer-events:none;opacity:0;transition:opacity .2s}
#zoom-indicator.show{opacity:1}
#bottom{flex-shrink:0;background:#1a1a1a;border-top:1px solid #222;padding:2px 8px 6px;padding-bottom:env(safe-area-inset-bottom,6px)}
#phone-strip{display:flex;gap:3px;overflow-x:auto;padding:3px 4px;margin-bottom:3px;scrollbar-width:none;-webkit-overflow-scrolling:touch}
#phone-strip::-webkit-scrollbar{display:none}
.phone-btn{flex-shrink:0;padding:3px 8px;border:1px solid #333;border-radius:10px;background:#1a1a1a;color:#666;font-family:inherit;font-size:8px;cursor:pointer;transition:all .12s;white-space:nowrap;letter-spacing:.2px}
.phone-btn:active{transform:scale(.95)}
.phone-btn.active{background:#ff6b35;color:#fff;border-color:#ff6b35}
#ctrl-row{display:flex;align-items:center;justify-content:center;gap:10px}
#shutter{width:58px;height:58px;border-radius:50%;border:3px solid #888;background:radial-gradient(circle at 35% 35%,#333,#111);cursor:pointer;position:relative;flex-shrink:0}
#shutter:active{transform:scale(.9)}
#shutter::after{content:'';position:absolute;inset:4px;border-radius:50%;background:radial-gradient(circle at 35% 35%,#444,#1a1a1a);border:1px solid #333}
.ctrl-btn{background:none;border:1px solid #444;border-radius:8px;color:#777;width:36px;height:32px;cursor:pointer;position:relative;flex-shrink:0;transition:all .15s;display:flex;align-items:center;justify-content:center}
.ctrl-btn:active{background:#333;border-color:#666}
#btn-flip{width:44px;height:36px}
#btn-flip svg{width:18px;height:18px;stroke:#888}
#btn-flip:active svg{stroke:#fff}
#btn-rec{width:36px;height:36px;border-radius:50%;border:2px solid #555;background:transparent}
#btn-rec::after{content:'';width:14px;height:14px;border-radius:2px;background:#cc3333;transition:all .15s}
#btn-rec.recording::after{border-radius:50%;width:10px;height:10px;background:#ff0000}
#btn-rec.recording{border-color:#ff4444}
#btn-settings svg{width:16px;height:16px;stroke:#888}
#btn-settings:active svg{stroke:#fff}
#toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#1a1a1a;color:#aaa;padding:6px 14px;border-radius:4px;font-size:10px;z-index:200;opacity:0;transition:opacity .25s;pointer-events:none;border:1px solid #333}
#toast.show{opacity:1}


#settings-backdrop{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:149}
#settings-backdrop.open{display:block}
#settings-panel{position:fixed;bottom:0;left:0;right:0;background:#1a1a1a;border-top:2px solid #333;z-index:150;transform:translateY(100%);transition:transform .25s ease;padding:12px 16px;padding-bottom:env(safe-area-inset-bottom,16px)}
#settings-panel.open{transform:translateY(0)}
#settings-panel h3{font-size:10px;color:#666;letter-spacing:1px;margin-bottom:8px}
.setting-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid #1a1a1a}
.setting-row label{font-size:10px;color:#999}
.setting-row input[type=range]{width:100px;accent-color:#ff6b35;height:16px}
.setting-row select{background:#222;color:#aaa;border:1px solid #333;padding:2px 6px;border-radius:4px;font:inherit;font-size:10px}
.toggle-btn{width:34px;height:18px;border-radius:9px;background:#333;cursor:pointer;position:relative;transition:background .15s;border:none;padding:0}
.toggle-btn.on{background:#ff6b35}
.toggle-btn::after{content:'';position:absolute;top:2px;left:2px;width:14px;height:14px;border-radius:50%;background:#aaa;transition:transform .15s,background .15s}
.toggle-btn.on::after{transform:translateX(16px);background:#fff}
</style>
</head>
<body>
<div id="app">
  <div id="top">
    <span class="l">0.3MP</span>
    <span class="m"><span id="rec-dot"></span><span id="phone-name">Nokia 7650</span></span>
    <span class="r" id="res-display">---</span>
  </div>
  <div id="view">
    <video id="cam" autoplay playsinline muted></video>
    <canvas id="out"></canvas>
    <div id="zoom-indicator">1×</div>
  </div>
  <div id="bottom">
    <div id="phone-strip"></div>
    <div id="ctrl-row">
      <button class="ctrl-btn" id="btn-flip">
        <svg viewBox="0 0 24 24" fill="none" stroke-linecap="round" stroke-linejoin="round">
          <path d="M1 12c0 6.075 4.925 11 11 11s11-4.925 11-11S18.075 1 12 1"/>
          <path d="M12 1v4h4"/>
          <path d="M23 12c0-6.075-4.925-11-11-11"/>
          <path d="M12 23v-4H8"/>
        </svg>
      </button>
      <div id="shutter"></div>
      <button class="ctrl-btn" id="btn-rec"></button>
      <button class="ctrl-btn" id="btn-settings">
        <svg viewBox="0 0 24 24" fill="none" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3"/>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
        </svg>
      </button>
    </div>
  </div>
</div>
<div id="settings-backdrop"></div>
<div id="settings-panel">
  <h3>⚙ SETTINGS</h3>
  <div class="setting-row"><label>Format</label><select id="set-format"><option value="auto">Auto</option><option value="4:3">4:3</option><option value="16:9">16:9</option><option value="1:1">1:1</option></select></div>
  <div class="setting-row"><label>Digital zoom</label><input type="range" id="set-zoom" min="1" max="4" step="0.1" value="1"></div>
  <div class="setting-row"><label>Noise</label><input type="range" id="set-noise" min="50" max="250" value="150"></div>
  <div class="setting-row"><label>JPEG artifacts</label><input type="range" id="set-jpeg" min="1" max="6" step="1" value="3"></div>
  <div class="setting-row"><label>Vignette</label><input type="range" id="set-vignette" min="0" max="100" value="60"></div>
  <div class="setting-row"><label>Quality</label><select id="set-quality"><option value="p">PNG</option><option value="90">JPEG 90%</option><option value="70" selected>JPEG 70%</option><option value="40">JPEG 40%</option></select></div>
</div>
<div id="toast"></div>

<script>
// ================================================================
// ПРЕСЕТЫ
// ================================================================
const PHONES = [
  {id:'nokia7650', name:'Nokia 7650', year:'2002',
   p:{blur:3, nR:28, nG:22, nB:34, nM:16, post:28, cR:1.10, cG:1.05, cB:.80, hR:.95,hG:1.08,hB:.92, cont:1.10, shLift:12, shThr:55, vig:.50, jpeg:3}},
  {id:'siemensS65', name:'Siemens S65', year:'2004',
   p:{blur:4, nR:18, nG:16, nB:22, nM:10, post:24, cR:1.15, cG:1.08, cB:.75, hR:1.06,hG:1.03,hB:.88, cont:1.18, shLift:6, shThr:42, vig:.60, jpeg:4}},
  {id:'sonyK750', name:'SonyEric K750i', year:'2005',
   p:{blur:2, nR:12, nG:10, nB:16, nM:6, post:18, cR:.93, cG:1.01, cB:1.10, hR:.96,hG:.98,hB:1.05, cont:1.02, shLift:4, shThr:35, vig:.20, jpeg:5}},
  {id:'motoRAZR', name:'Motorola RAZR V3', year:'2004',
   p:{blur:3, nR:32, nG:26, nB:38, nM:18, post:32, cR:.90, cG:.86, cB:1.18, hR:1.04,hG:.92,hB:1.06, cont:1.14, shLift:14, shThr:62, vig:.38, jpeg:3}},
  {id:'sharpGX30', name:'Sharp GX30', year:'2004',
   p:{blur:1.5, nR:8, nG:7, nB:10, nM:4, post:15, cR:1.06, cG:1.03, cB:.90, hR:1.03,hG:1.01,hB:.96, cont:1.0, shLift:3, shThr:30, vig:.15, jpeg:6}},
  {id:'nokiaN70', name:'Nokia N70', year:'2005',
   p:{blur:2.5, nR:14, nG:12, nB:16, nM:8, post:20, cR:1.03, cG:1.01, cB:.93, hR:1.0,hG:1.0,hB:1.0, cont:1.06, shLift:6, shThr:40, vig:.28, jpeg:4}},
];

// ================================================================
// ДВИЖОК — реалистичное плохое качество старого телефона
// ================================================================
const SENSOR_W = 320, SENSOR_H = 240;

// rolling shutter / banding
let scanLinePhase = 0;

function processCamera(video, canvas, ctx, phoneIdx, zoom, noiseMul, jpegMul, vigMul) {
  if (video.readyState < 2) return;
  const W = canvas.width, H = canvas.height;
  if (!W || !H) return;

  const p = PHONES[phoneIdx].p;
  scanLinePhase += 0.02;

  // 1. Рисуем видео на временный холст
  const srcC = document.createElement('canvas');
  srcC.width = W; srcC.height = H;
  const srcX = srcC.getContext('2d');
  srcX.drawImage(video, 0, 0, W, H);

  // 1a. Цифровой зум (кроп + smooth scale)
  if (zoom > 1.01) {
    const cw = W / zoom, ch = H / zoom;
    const ox = (W - cw) / 2, oy = (H - ch) / 2;
    const zc = document.createElement('canvas');
    zc.width = W; zc.height = H;
    const zx = zc.getContext('2d');
    zx.imageSmoothingEnabled = true;
    zx.drawImage(srcC, ox, oy, cw, ch, 0, 0, W, H);
    srcX.clearRect(0, 0, W, H);
    srcX.drawImage(zc, 0, 0);
  }

  // 2. Downscale до 320x240 (smooth)
  const low = document.createElement('canvas');
  low.width = SENSOR_W; low.height = SENSOR_H;
  const lx = low.getContext('2d');
  lx.imageSmoothingEnabled = true;
  lx.drawImage(srcC, 0, 0, SENSOR_W, SENSOR_H);

  // 3. Пиксельные эффекты на низком разрешении
  const img = lx.getImageData(0, 0, SENSOR_W, SENSOR_H);
  const d = img.data;

  // 3a. Прогрев сенсора — неравномерная яркость по горизонтали
  // (у старых CMOS сенсоров одна сторона кадра теплее)
  for (let y = 0; y < SENSOR_H; y++) {
    const warmth = 1 + Math.sin(y / SENSOR_H * Math.PI) * 0.08;
    for (let x = 0; x < SENSOR_W; x++) {
      const i = (y * SENSOR_W + x) * 4;
      d[i]   = Math.min(255, d[i] * warmth);
      d[i+1] = Math.min(255, d[i+1] * warmth);
      d[i+2] = Math.min(255, d[i+2] * (2 - warmth));
    }
  }

  // 3b. Цветной шум сенсора + banding (полосы)
  for (let y = 0; y < SENSOR_H; y++) {
    const band = 1 + Math.sin(y * 0.5 + scanLinePhase) * 0.03;
    for (let x = 0; x < SENSOR_W; x++) {
      const i = (y * SENSOR_W + x) * 4;
      const rn = (Math.random()-.5)*p.nR*noiseMul;
      const gn = (Math.random()-.5)*p.nG*noiseMul;
      const bn = (Math.random()-.5)*p.nB*noiseMul;
      const ln = (Math.random()-.5)*p.nM*noiseMul;
      d[i]   = Math.max(0, Math.min(255, (d[i]+rn+ln) * band));
      d[i+1] = Math.max(0, Math.min(255, (d[i+1]+gn+ln) * band));
      d[i+2] = Math.max(0, Math.min(255, (d[i+2]+bn+ln) * band));
    }
  }

  // 3c. Засветы (bloom) — яркие области "светятся" в соседние пиксели
  for (let y = 1; y < SENSOR_H-1; y++) {
    for (let x = 1; x < SENSOR_W-1; x++) {
      const i = (y * SENSOR_W + x) * 4;
      const bright = d[i] + d[i+1] + d[i+2];
      if (bright > 600) {
        for (let dy = -1; dy <= 1; dy++)
          for (let dx = -1; dx <= 1; dx++) {
            if (dy === 0 && dx === 0) continue;
            const ni = ((y+dy) * SENSOR_W + (x+dx)) * 4;
            d[ni]   = Math.min(255, d[ni] + 4);
            d[ni+1] = Math.min(255, d[ni+1] + 4);
            d[ni+2] = Math.min(255, d[ni+2] + 4);
          }
      }
    }
  }

  // 3d. Постеризация + цветовые пятна (не блоками, а плавно)
  for (let y = 0; y < SENSOR_H; y++) {
    for (let x = 0; x < SENSOR_W; x++) {
      const i = (y * SENSOR_W + x) * 4;
      // Квантуем цвета грубо
      const step = 20;
      d[i]   = Math.round(d[i] / step) * step;
      d[i+1] = Math.round(d[i+1] / step) * step;
      d[i+2] = Math.round(d[i+2] / step) * step;
    }
  }

  // 3e. Хроматическая аберрация (purple fringing на контрастных границах)
  for (let y = 0; y < SENSOR_H; y++) {
    for (let x = 1; x < SENSOR_W; x++) {
      const i = (y * SENSOR_W + x) * 4;
      const prev = (y * SENSOR_W + (x-1)) * 4;
      const diff = Math.abs(d[i] - d[prev]) + Math.abs(d[i+1] - d[prev+1]) + Math.abs(d[i+2] - d[prev+2]);
      if (diff > 100) {
        // Фиолетовая кайма
        d[prev]   = Math.min(255, d[prev] + 15);
        d[prev+2] = Math.min(255, d[prev+2] + 20);
      }
    }
  }

  // 3f. Цветовая кривая: контраст + пересветы + тени
  const lut = new Uint8Array(256);
  for (let v = 0; v < 256; v++) {
    let f = (v - 128) * p.cont + 128;
    // Мягкий пересвет (blown highlights, но не агрессивный)
    if (f > 230) f = 230 + (f - 230) * 0.5;
    // Тени поднимаем
    if (f < 40) f = f * 0.5 + 20;
    lut[v] = Math.round(Math.max(0, Math.min(255, f)));
  }

  // 3g. Highlight tint — оттенок белого для каждого телефона
  for (let i = 0; i < d.length; i += 4) {
    const r = lut[Math.round(d[i])];
    const g = lut[Math.round(d[i+1])];
    const b = lut[Math.round(d[i+2])];
    const bright = r + g + b;
    // Чем ярче пиксель, тем сильнее применяем оттенок белого
    const mix = bright > 500 ? 1.0 : bright > 300 ? (bright - 300) / 200 : 0;
    d[i]   = Math.min(255, Math.round(r * (p.cR + mix * (p.hR - p.cR))));
    d[i+1] = Math.min(255, Math.round(g * (p.cG + mix * (p.hG - p.cG))));
    d[i+2] = Math.min(255, Math.round(b * (p.cB + mix * (p.hB - p.cB))));
  }

  lx.putImageData(img, 0, 0);

  // 4. Upscale обратно (smooth, без пикселей!)
  const resultC = document.createElement('canvas');
  resultC.width = W; resultC.height = H;
  const resultX = resultC.getContext('2d');
  resultX.imageSmoothingEnabled = true;
  resultX.drawImage(low, 0, 0, W, H);

  // 5. Виньетка + грязный объектив (пятна)
  const final = resultX.getImageData(0, 0, W, H);
  const fd = final.data;
  const cx = W/2, cy = H/2, md = Math.sqrt(cx*cx+cy*cy);
  const v = p.vig * vigMul;
  for (let y = 0; y < H; y++) {
    for (let x = 0; x < W; x++) {
      const f = 1 - (Math.sqrt((x-cx)**2+(y-cy)**2)/md)**2 * v;
      const i = (y*W+x)*4;
      fd[i]   = Math.round(fd[i] * f);
      fd[i+1] = Math.round(fd[i+1] * f);
      fd[i+2] = Math.round(fd[i+2] * f);
    }
  }
  // Пылинки на матрице (тёмные точки)
  for (let i = 0; i < 5; i++) {
    const px = Math.floor(Math.random() * W);
    const py = Math.floor(Math.random() * H);
    const pi = (py * W + px) * 4;
    fd[pi] = fd[pi+1] = fd[pi+2] = Math.round(fd[pi] * 0.3);
  }

  ctx.putImageData(final, 0, 0);
}

// ================================================================
// ПРИЛОЖЕНИЕ
// ================================================================
const $ = s => document.querySelector(s);
const $$ = s => document.querySelectorAll(s);

const video = $('#cam'), canvas = $('#out'), ctx = canvas.getContext('2d');

let stream = null, facing = 'environment';
let phoneIdx = 0, zoom = 1;
let W = 480, H = 360;
let noiseMul = 1.5, jpegMul = 1, vigMul = 0.6;

function getPhone() { return PHONES[phoneIdx]; }

// ===== КАМЕРА =====
async function startCam() {
  if (stream) stream.getTracks().forEach(t => t.stop());
  if (recorder) { recorder.stop(); recorder = null; }
  isRecording = false;
  $('#btn-rec').classList.remove('recording');
  $('#rec-dot').classList.remove('on');

  try {
    stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: facing, width: { ideal: 640 }, height: { ideal: 480 } },
      audio: true
    });
    video.srcObject = stream;
    return new Promise(r => {
      video.onloadedmetadata = () => {
        const vw = video.videoWidth, vh = video.videoHeight;
        const fmt = $('#set-format').value;
        let ar = vw / vh;
        if (fmt !== 'auto') { const p = fmt.split(':'); ar = parseInt(p[0]) / parseInt(p[1]); }
        W = Math.min(vw, 640); H = Math.round(W / ar);
        if (H > 480) { H = Math.min(vh, 480); W = Math.round(H * ar); }
        canvas.width = W; canvas.height = H;
        $('#res-display').textContent = `${W}×${H}`;
        r();
      };
      video.onerror = r;
    });
  } catch (e) {
    console.error('Camera error', e);
    return;
  }
}

// ===== ZOOM =====
let lastDist = 0, lastZoom = 1;
$('#view').addEventListener('touchstart', e => {
  if (e.touches.length === 2) {
    lastDist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
    lastZoom = zoom;
  }
});
$('#view').addEventListener('touchmove', e => {
  if (e.touches.length === 2) {
    e.preventDefault();
    const d = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
    zoom = Math.max(1, Math.min(4, lastZoom * d / lastDist));
    $('#set-zoom').value = zoom;
    const zi = $('#zoom-indicator');
    zi.textContent = zoom.toFixed(1) + '×';
    zi.classList.add('show');
    clearTimeout(zi._t);
    zi._t = setTimeout(() => zi.classList.remove('show'), 700);
  }
});

// ===== ФОТО =====
function capture() {
  processCamera(video, canvas, ctx, phoneIdx, zoom, noiseMul, jpegMul, vigMul);
  const fmt = $('#set-quality').value;
  const q = fmt === 'p' ? undefined : parseInt(fmt) / 100;
  const ext = fmt === 'p' ? 'png' : 'jpg';
  canvas.toBlob(blob => {
    if (!blob) return;
    const a = document.createElement('a');
    a.download = `phonecam_${Date.now()}.${ext}`;
    a.href = URL.createObjectURL(blob);
    a.click();
    setTimeout(() => URL.revokeObjectURL(a.href), 1000);
    const t = $('#toast');
    t.textContent = `📸 Saved (${(blob.size / 1024).toFixed(0)}KB)`;
    t.classList.add('show');
    clearTimeout(t._t);
    t._t = setTimeout(() => t.classList.remove('show'), 1200);
  }, q ? `image/jpeg` : 'image/png', q);
}

// ===== ВИДЕО =====
let recorder = null, recChunks = [], isRecording = false;

async function toggleVideo() {
  if (isRecording) { stopRecording(); return; }
  startRecording();
}
async function startRecording() {
  if (!stream) return;
  try {
    recChunks = [];
    const cs = canvas.captureStream(10);
    const at = stream.getAudioTracks()[0];
    if (at) cs.addTrack(at);
    const mt = MediaRecorder.isTypeSupported('video/webm;codecs=vp8') ? 'video/webm;codecs=vp8' : 'video/webm';
    recorder = new MediaRecorder(cs, { mimeType: mt, videoBitsPerSecond: 50000, audioBitsPerSecond: 4000 });
    recorder.ondataavailable = e => { if (e.data.size > 0) recChunks.push(e.data); };
    recorder.onstop = () => {
      if (recChunks.length) {
        const blob = new Blob(recChunks, { type: 'video/webm' });
        const v = document.createElement('video');
        v.src = URL.createObjectURL(blob); v.controls = true; v.autoplay = true;
        popupMedia.innerHTML = ''; popupMedia.appendChild(v);
        popup.classList.add('open');
      }
      isRecording = false;
      $('#btn-rec').classList.remove('recording');
      $('#rec-dot').classList.remove('on');
    };
    recorder.start(1000);
    isRecording = true;
    $('#btn-rec').classList.add('recording');
    $('#rec-dot').classList.add('on');
  } catch (e) { console.error('rec failed', e); }
}
function stopRecording() {
  if (recorder && recorder.state !== 'inactive') { recorder.stop(); recorder = null; }
}

// ===== БЛОКИРОВКА ЗУМА САЙТА =====
let lastTouch = 0;
document.addEventListener('touchend', e => {
  const n = Date.now();
  if (n - lastTouch < 300) e.preventDefault();
  lastTouch = n;
}, { passive: false });
document.addEventListener('gesturestart', e => e.preventDefault());

document.addEventListener('DOMContentLoaded', async () => {
  // Собираем phone-strip
  const strip = $('#phone-strip');
  PHONES.forEach((ph, i) => {
    const b = document.createElement('button');
    b.className = 'phone-btn' + (i === 0 ? ' active' : '');
    b.textContent = ph.name;
    b.addEventListener('click', () => {
      phoneIdx = i;
      $$('.phone-btn').forEach((bb, j) => bb.classList.toggle('active', j === i));
      $('#phone-name').textContent = PHONES[i].name;
    });
    strip.appendChild(b);
  });

  await startCam();

  // Основной цикл
  let running = true;
  function loop() {
    if (!running) return;
    try {
      processCamera(video, canvas, ctx, phoneIdx, zoom, noiseMul, jpegMul, vigMul);
    } catch (e) { /* silent */ }
    requestAnimationFrame(loop);
  }
  if (stream) loop();

  // Кнопки
  $('#shutter').addEventListener('click', capture);
  $('#btn-rec').addEventListener('click', toggleVideo);
  $('#btn-flip').addEventListener('click', async () => {
    facing = facing === 'environment' ? 'user' : 'environment';
    await startCam();
  });
});

if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(() => {});
